name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Node is required: Hugo's css.TailwindCSS calls the @tailwindcss/cli npm
      # package, and Pagefind runs via npx. Both come from package-lock.json.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24   # @tailwindcss/cli uses Node's --permission flag (Node >= 22)

      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Node dependencies (Tailwind CLI + Pagefind)
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # create the Pages site on first run, no manual setup needed

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          TZ: Europe/Copenhagen
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build Pagefind search index
        run: npx pagefind --site public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
