baseURL: "https://jespernwulff.github.io/"
title: "Jesper N. Wulff"
languageCode: en-us
enableRobotsTXT: true
capitalizeListTitles: false
summaryLength: 30
timeZone: Europe/Copenhagen

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-tailwind

build:
  buildStats:
    enable: true   # emits hugo_stats.json so Tailwind sees classes used in templates/content
  cachebusters:
    - source: assets/notwatching/hugo_stats\.json
      target: css
    - source: (postcss|tailwind)\.config\.js
      target: css

outputs:
  home: [HTML, RSS]

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 3

taxonomies:
  tag: tags
  publication_type: publication_types

permalinks:
  publication: /publication/:contentbasename/
  software: /software/:contentbasename/

# The homepage is a custom landing (layouts/index.html); silence Blox's "no sections" note.
ignoreLogs:
  - "sections-none-/"

params:
  # --- Owner identity (used by custom templates) ---
  author_name: "Jesper N. Wulff"
  role: "Professor of Business Economics"
  institution: "Aarhus University"
  institution_url: "https://econ.au.dk/"
  email: "jwulff@econ.au.dk"

  # Scholarly / social profiles (icon links in hero, footer, contact)
  profiles:
    - name: "Email"
      icon: "email"
      url: "mailto:jwulff@econ.au.dk"
    - name: "Google Scholar"
      icon: "scholar"
      url: "https://scholar.google.com/citations?view_op=search_authors&mauthors=Jesper+N.+Wulff"
    - name: "ORCID"
      icon: "orcid"
      url: "https://orcid.org/0000-0002-7976-0939"
    - name: "GitHub"
      icon: "github"
      url: "https://github.com/jespernwulff"
    - name: "LinkedIn"
      icon: "linkedin"
      url: "https://www.linkedin.com/in/wulffjn/"
    - name: "University profile"
      icon: "university"
      url: "https://pure.au.dk/portal/en/persons/jwulff@econ.au.dk"

  # --- GaryKing.org/mysite footer credit + discovery metadata (on by default, opt-out) ---
  mysite:
    credit: true
    discovery: true

  # --- Appearance (Hugo Blox) — palette is overridden in assets/css/custom.css ---
  appearance:
    mode: light
    color: blue
    font: sans
    font_size: L

  header:
    navbar:
      enable: true
      fixed_to_top: true
      show_search: true
      logo:
        text: "Jesper N. Wulff"

  marketing:
    seo:
      description: "Jesper N. Wulff develops and applies empirical methods in management research and the social sciences at Aarhus University."

menu:
  main:
    - name: "Bio & C.V."
      url: /bio/
      weight: 10
    - name: "Writings"
      url: /publication/
      weight: 20
    - name: "Research Areas"
      url: /#research-areas
      weight: 30
    - name: "Software"
      url: /software/
      weight: 40
    - name: "Teaching"
      url: /teaching/
      weight: 60
    - name: "Contact"
      url: /contact/
      weight: 70
