{{- /* Pagefind search modal. Loads the ~200KB WASM bundle on first open only.
       Subpath-safe import via relURL. Falls back to Google site: search if Pagefind is unavailable. */ -}}
<div id="search-modal" class="search-modal" hidden role="dialog" aria-modal="true" aria-label="Search">
  <div class="search-modal__backdrop" data-close></div>
  <div class="search-modal__panel" role="document">
    <div class="search-modal__bar">
      <svg class="search-modal__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input id="search-input" type="search" placeholder="Search publications, people, and pages…" autocomplete="off" spellcheck="false" aria-label="Search query" />
      <button class="search-modal__close" type="button" data-close aria-label="Close search">Esc</button>
    </div>
    <div id="search-results" class="search-results" aria-live="polite"></div>
  </div>
</div>
<script>
(function () {
  var modal = document.getElementById('search-modal');
  var input = document.getElementById('search-input');
  var results = document.getElementById('search-results');
  if (!modal || !input) return;
  var pf = null, loading = false, loaded = false, timer;

  function open() {
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
    setTimeout(function () { input.focus(); input.select(); }, 30);
    ensurePagefind();
  }
  function close() { modal.hidden = true; document.body.style.overflow = ''; }
  window.__openSearch = open;

  function ensurePagefind() {
    if (loaded || loading) return;
    loading = true;
    import('{{ "pagefind/pagefind.js" | relURL }}')
      .then(function (m) { pf = m; return pf.init ? pf.init() : null; })
      .then(function () { loaded = true; if (input.value) run(); })
      .catch(function () { pf = null; loaded = true; });
  }
  function esc(s) { return (s || '').replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]; }); }

  input.addEventListener('input', function () { clearTimeout(timer); timer = setTimeout(run, 160); });

  function run() {
    var q = input.value.trim();
    if (!q) { results.innerHTML = ''; return; }
    if (!pf) {
      var g = 'https://www.google.com/search?q=' + encodeURIComponent('site:jespernwulff.github.io ' + q);
      results.innerHTML = '<a class="search-fallback" target="_blank" rel="noopener" href="' + g + '">Search this site on Google &rarr;</a>';
      return;
    }
    pf.search(q).then(function (s) {
      return Promise.all(s.results.slice(0, 8).map(function (r) { return r.data(); }));
    }).then(function (items) {
      if (!items.length) { results.innerHTML = '<p class="search-none">No results found.</p>'; return; }
      results.innerHTML = items.map(function (d) {
        return '<a class="search-hit" href="' + d.url + '"><span class="search-hit__title">' + esc(d.meta && d.meta.title) + '</span><span class="search-hit__excerpt">' + (d.excerpt || '') + '</span></a>';
      }).join('');
    });
  }

  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); modal.hidden ? open() : close(); }
    else if (e.key === 'Escape' && !modal.hidden) { close(); }
  });
  modal.addEventListener('click', function (e) { if (e.target.hasAttribute('data-close')) close(); });
})();
</script>
